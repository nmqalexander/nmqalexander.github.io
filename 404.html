<!DOCTYPE html>
<html lang="vi">

<head>
    <title></title>
    <meta name="og:title" property="og:title" content />
    <meta name="og:type" property="og:type" content="article" />
    <meta name="og:url" property="og:url" content />
    <meta name="description" content />
    <meta name="og:description" property="og:description" content />
    <meta name="keyword" content />
    <meta name="og:image" property="og:image" content />
    <meta name="og:image:width" property="og:image:width" content />
    <meta name="og:image:height" property="og:image:height" content />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="black" />
    <meta name="theme-color" content="#000000" />
    <meta name="author" content="NMQ Alexander">
    <meta name="copyright" content="NMQ Alexander">
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <meta name="revisit-after" content="1 days">
    <meta http-equiv="Permissions-Policy" content="interest-cohort=()">
    <script type="text/javascript">
        var pathSegmentsToKeep = 0

        var l = window.location
        l.replace(
            l.protocol + "//" + l.hostname + (l.port ? ":" + l.port : "") +
            l.pathname.split("/").slice(0, 1 + pathSegmentsToKeep).join("/") + "/?/" +
            l.pathname.slice(1).split("/").slice(pathSegmentsToKeep).join("/").replace(/&/g, "~and~") +
            (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
            l.hash
        )
    </script>
    <script>
        const handleToUrl = (str) => {
            str = str.replaceAll(/à|á|ạ|ả|ã|â|ầ|ấ|ậ|ẩ|ẫ|ă|ằ|ắ|ặ|ẳ|ẵ/g, "a");
            str = str.replaceAll(/è|é|ẹ|ẻ|ẽ|ê|ề|ế|ệ|ể|ễ/g, "e");
            str = str.replaceAll(/ì|í|ị|ỉ|ĩ/g, "i");
            str = str.replaceAll(/ò|ó|ọ|ỏ|õ|ô|ồ|ố|ộ|ổ|ỗ|ơ|ờ|ớ|ợ|ở|ỡ/g, "o");
            str = str.replaceAll(/ù|ú|ụ|ủ|ũ|ư|ừ|ứ|ự|ử|ữ/g, "u");
            str = str.replaceAll(/ỳ|ý|ỵ|ỷ|ỹ/g, "y");
            str = str.replaceAll(/đ/g, "d");
            str = str.replaceAll(/À|Á|Ạ|Ả|Ã|Â|Ầ|Ấ|Ậ|Ẩ|Ẫ|Ă|Ằ|Ắ|Ặ|Ẳ|Ẵ/g, "A");
            str = str.replaceAll(/È|É|Ẹ|Ẻ|Ẽ|Ê|Ề|Ế|Ệ|Ể|Ễ/g, "E");
            str = str.replaceAll(/Ì|Í|Ị|Ỉ|Ĩ/g, "I");
            str = str.replaceAll(/Ò|Ó|Ọ|Ỏ|Õ|Ô|Ồ|Ố|Ộ|Ổ|Ỗ|Ơ|Ờ|Ớ|Ợ|Ở|Ỡ/g, "O");
            str = str.replaceAll(/Ù|Ú|Ụ|Ủ|Ũ|Ư|Ừ|Ứ|Ự|Ử|Ữ/g, "U");
            str = str.replaceAll(/Ỳ|Ý|Ỵ|Ỷ|Ỹ/g, "Y");
            str = str.replaceAll(/Đ/g, "D");
            // Some system encode vietnamese combining accent as individual utf-8 characters
            // Một vài bộ encode coi các dấu mũ, dấu chữ như một kí tự riêng biệt nên thêm hai dòng này
            str = str.replaceAll(/\u0300|\u0301|\u0303|\u0309|\u0323/g, ""); // ̀ ́ ̃ ̉ ̣  huyền, sắc, ngã, hỏi, nặng
            str = str.replaceAll(/\u02C6|\u0306|\u031B/g, ""); // ˆ ̆ ̛  Â, Ê, Ă, Ơ, Ư
            // Remove punctuations
            // Bỏ dấu câu, kí tự đặc biệt
            str = str.replaceAll(/!|@|%|\^|\*|\(|\)|\+|=|<|>|\?|\/|,|\.|:|;|'|"|&|#|\[|\]|~|\$|_|`|-|{|}|\||\\/g, "");
            // Remove extra spaces
            // Bỏ các khoảng trắng liền nhau
            str = str.replaceAll(/ + /g, " ");
            str = str.replaceAll("  ", "");
            str = str.trim();

            str = str.replaceAll(" ", "-")
            return str.toLowerCase();
        }

        const devMode = false
        const currentPage = devMode ? "downloads" : window.location.pathname.split("/")[1]
        const currentContent = devMode ? "sap-co" : window.location.pathname.split("/")[2]

        if (currentContent === undefined) {
            const pageData = [
                {
                    url: "downloads", title: "Tải về", keyword: "",
                    description: "", thumbnail: ""
                },
                {
                    url: "videos", title: "Videos", keyword: "",
                    description: "", thumbnail: ""
                },
                {
                    url: "contents", title: "Tải về", keyword: "",
                    description: "", thumbnail: ""
                }
            ]
            for (let index = 0; index < pageData.length; index++) {
                if (currentPage === pageData[index].url) {
                    document.title = pageData[index].title
                    document.getElementsByName("og:title")[0].content = pageData[index].title
                    document.getElementsByName("og:url")[0].content = window.location.origin
                    document.getElementsByName("description")[0].content = pageData[index].description
                    document.getElementsByName("og:description")[0].content = pageData[index].description
                    document.getElementsByName("keyword")[0].content = pageData[index].keyword
                    // document.getElementsByName("og:image")[0].content = data.thumbnail
                    document.getElementsByName("og:image")[0].content = "https://yt3.googleusercontent.com/SbwVLzJ7p56KUgGA_vGAxGCs9e3pAGPYCeVqDq2RDhPgoN4yt7a2OCp0II7bTcPqRDHPz5zK"
                    document.getElementsByName("og:image:width")[0].content = 512
                    document.getElementsByName("og:image:height")[0].content = 288
                }
            }

        } else {
            fetch("https://nmqalexander.github.io/data/layoutA.json").then(async (res) => {
                const handleData = await res.json()
                const data = handleData[currentPage].contents.find(item => handleToUrl(item.title) === currentContent)
                document.title = data.title
                document.getElementsByName("og:title")[0].content = data.title
                document.getElementsByName("og:url")[0].content = window.location.origin
                document.getElementsByName("description")[0].content = data.description
                document.getElementsByName("og:description")[0].content = data.description
                document.getElementsByName("keyword")[0].content = data.keyword
                if (currentPage === "contents") {
                    document.getElementsByName("og:image")[0].content = `https://i.ytimg.com/vi/${data.link}/hq720.jpg`
                } else {
                    document.getElementsByName("og:image")[0].content = data.thumbnail
                }
                window.location.href = `https://nmqalexander.github.io/${currentPage}/${handleToUrl(data.title)}`
                document.getElementsByName("og:image:width")[0].content = 720
                document.getElementsByName("og:image:height")[0].content = 405
            })
        }
    </script>
</head>
